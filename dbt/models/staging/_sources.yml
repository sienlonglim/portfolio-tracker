version: 2

sources:
  - name: raw
    database: portfolio-tracker
    schema: raw
    tables:
      - name: stock_prices_open_close
        description: "Open and close prices for stocks (daily)."
        columns:
          - name: data
            description: "A single Parquet object. File contains a wide range of columns depending on the original file."
          - name: meta_file_name
            description: "Meta column describing the name of the file in S3."
          - name: meta_file_modified
            description: "Meta column describing the last modified date of the file in S3."
          - name: meta_file_scan
            description: "Meta column describing when the file was last ingested."
      - name: portfolio_positions
        description: "Portfolio positions for all holders."
        columns:
          - name: id
            description: "Unique identifier for the position."
          - name: holder
            description: "Name of the holder."
          - name: account
            description: "Account associated with the position."
          - name: sym
            description: "Stock symbol."
          - name: buy_date
            description: "Date when the stock was bought."
          - name: buy_price
            description: "Price at which the stock was bought."
          - name: close_price
            description: "Price at which the stock was sold or closed."
          - name: close_date
            description: "Date when the stock was sold or closed."
